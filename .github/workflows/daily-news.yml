name: Daily Market News Update

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "Brief to generate"
        required: true
        default: close
        type: choice
        options:
          - close
          - premarket
  schedule:
    - cron: "30 12 * * 1-5"
    - cron: "0 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-market-news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: https://api.deepseek.com/v1
      OPENAI_MODEL: deepseek-chat
      WORKSPACE_ROOT: ${{ github.workspace }}
      REPORT_OUTPUT_DIR: ${{ github.workspace }}/reports
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # A PAT-triggered push can start branch-based Pages publishing.
          # GitHub suppresses that follow-up when a workflow pushes with GITHUB_TOKEN.
          token: ${{ secrets.PAGES_PUSH_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Select report type
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule }}
          MANUAL_REPORT_TYPE: ${{ inputs.report_type }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            report_type="${MANUAL_REPORT_TYPE:-close}"
          elif [[ "$SCHEDULE_EXPRESSION" == "30 12 * * 1-5" ]]; then
            report_type="premarket"
          else
            report_type="close"
          fi
          echo "REPORT_TYPE=$report_type" >> "$GITHUB_ENV"
          echo "Generating $report_type market brief"

      - name: Generate report data
        run: python main.py

      - name: Build static website
        working-directory: frontend
        run: npm run build

      - name: Verify static website
        run: test -f site/index.html

      - name: Commit generated report and site
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add \
            reports/latest.json \
            reports/market_analysis.json \
            reports/source_diagnostics.json \
            reports/market_history.json \
            reports/market_snapshot.json \
            reports/market_trends.json \
            reports/history_index.json \
            index.html \
            .nojekyll \
            site/
          for typed_report in reports/premarket.json reports/close.json; do
            if [[ -f "$typed_report" ]]; then
              git add "$typed_report"
            fi
          done
          git add -f reports/history/
          if git diff --cached --quiet; then
            echo "No report or site changes to commit."
          else
            git commit -m "auto: update ${REPORT_TYPE} market brief"
            git push origin HEAD:main
          fi
